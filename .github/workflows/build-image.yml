name: build-image

# Builds the minimal "claude-only" image (claude-code/Dockerfile) and pushes it
# to Docker Hub as docker.io/zone1987/claude-code.
#
# There is no upstream Claude/npm release webhook, so we POLL once a day and only
# build when npm reports a Claude Code version whose image tag does not exist yet.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  -> zone1987
#   DOCKERHUB_TOKEN     -> a Docker Hub access token with Read/Write/Delete

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  push:
    branches: [ main ]
    paths:
      - 'claude-code/**'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a rebuild even if the version tag already exists'
        type: boolean
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  IMAGE: docker.io/zone1987/claude-code

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest Claude Code version from npm
        id: version
        run: |
          VERSION="$(npm view @anthropic-ai/claude-code version)"
          if [ -z "${VERSION}" ]; then
            echo "Could not resolve version from npm" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Latest Claude Code version: ${VERSION}"

      - name: Decide whether a build is needed
        id: gate
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          FORCE="${{ github.event.inputs.force }}"
          if [ "${FORCE}" = "true" ]; then
            echo "Forced rebuild requested."
            echo "build=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if docker buildx imagetools inspect "${IMAGE}:${VERSION}" >/dev/null 2>&1; then
            echo "Image ${IMAGE}:${VERSION} already exists; skipping build."
            echo "build=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Image ${IMAGE}:${VERSION} does not exist; building."
            echo "build=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up QEMU
        if: steps.gate.outputs.build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.gate.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.gate.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.gate.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./claude-code
          file: ./claude-code/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            CLAUDE_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max