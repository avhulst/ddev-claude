# Details about the install.yaml file are at https://ddev.readthedocs.io/en/stable/users/extend/additional-services/#sections-and-features-of-ddev-get-add-on-installyaml

name: claude

# pre_install_actions - list of actions to run before installing the addon.
pre_install_actions: []

# list of files and directories that are copied into the project .ddev directory.
# Each file contains #ddev-generated so it can be replaced by a later `ddev add-on get`
# if it hasn't been modified by the user.
project_files:
  - web-build/Dockerfile.claude
  - commands/web/claude
  - config.claude.yaml
  - claude-plugins.example.json

# List of files and directories that are copied into the global .ddev directory.
global_files: []

# Version constraint for DDEV that will be validated against the running DDEV executable
# and prevent add-on from being installed if it doesn't validate.
ddev_version_constraint: '>= v1.24.10'

# List of add-on names that this add-on depends on.
dependencies: []

# post_install_actions are executed in the context of the target project's .ddev directory.
post_install_actions:
  # Create the (gitignored) token file that passes the host's OAuth token into the
  # web container. It matches DDEV's default .gitignore pattern `/config.*.local.y*ml`,
  # so it is never committed. Only create it if the user doesn't already have one.
  - |
    #ddev-description:Create config.token.local.yaml for the Claude OAuth token
    if [ ! -f config.token.local.yaml ]; then
      cat > config.token.local.yaml <<'EOF'
    #ddev-generated
    # Passes your host's Claude OAuth token into the web container.
    # This file is gitignored by DDEV (matches /config.*.local.y*ml).
    #
    # Generate a token on the host with:  claude setup-token
    # then export it in your shell (e.g. ~/.zshrc):
    #   export CLAUDE_CODE_OAUTH_TOKEN="<your-token>"
    # and run `ddev restart`.
    #
    # CONTEXT7_TOKEN is OPTIONAL. The context7 plugin works without it (free tier,
    # lower rate limit). For a higher rate limit, get a key at
    # https://context7.com/dashboard and export it on the host:
    #   export CONTEXT7_TOKEN="<your-key>"
    web_environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - CONTEXT7_TOKEN=${CONTEXT7_TOKEN}
    EOF
    fi
  - |
    #ddev-description:Show next steps for Claude Code
    echo "Claude Code add-on installed."
    echo "1. On the host run 'claude setup-token' and export CLAUDE_CODE_OAUTH_TOKEN in your shell."
    echo "2. Run 'ddev restart', then 'ddev claude' to start Claude Code in the web container."
    echo "3. Optional: copy '.ddev/claude-plugins.example.json' to '.ddev/claude-plugins.json' to customize the installed marketplaces/plugins."

# removal_actions are executed in the context of the target project's .ddev directory.
removal_actions:
  - |
    if [ -f config.token.local.yaml ]; then
      if grep -q '#ddev-generated' config.token.local.yaml; then
        rm -f config.token.local.yaml
      else
        echo "Unwilling to remove 'config.token.local.yaml' because it does not have #ddev-generated in it; you can manually delete it if it is safe to delete."
      fi
    fi