#ddev-generated
# Claude Code auth + state persistence.
#
# Claude Code keeps its entire config + state (settings, credentials, projects/,
# plugins/, .claude.json) under CLAUDE_CONFIG_DIR. We point it at DDEV's global
# cache volume (/mnt/ddev-global-cache), which survives `ddev restart`,
# `ddev rebuild`, `ddev poweroff` and even `ddev delete` -- so you log in once
# and it sticks, stays out of Mutagen sync, and never lands in git.
#
# The value below is a SHARED login across all your projects (one login for
# everything). To isolate state per project instead, change the "shared" path
# segment to a unique literal name (e.g. your project name). Note: DDEV does NOT
# expand ${DDEV_PROJECT} inside web_environment, so use a literal name there.
web_environment:
  - CLAUDE_CONFIG_DIR=/mnt/ddev-global-cache/claude-code/shared
hooks:
  post-start:
    - exec: |
        set -eu
        # CLAUDE_CONFIG_DIR is provided via web_environment above; fall back to the
        # same default as a safety net so the hook never aborts under `set -u`.
        CLAUDE_CONFIG_DIR="${CLAUDE_CONFIG_DIR:-/mnt/ddev-global-cache/claude-code/shared}"
        mkdir -p "${CLAUDE_CONFIG_DIR}"

        # One-time migration from the previous symlink layout, where state lived in
        # "${CLAUDE_CONFIG_DIR}/.claude/" (alongside "${CLAUDE_CONFIG_DIR}/.claude.json").
        # CLAUDE_CONFIG_DIR expects everything flat in that directory, so lift the old
        # .claude/ contents up one level once. .claude.json is already in place.
        if [ -d "${CLAUDE_CONFIG_DIR}/.claude" ] && [ ! -e "${CLAUDE_CONFIG_DIR}/.ddev-claude-migrated" ]; then
            cp -an "${CLAUDE_CONFIG_DIR}/.claude/." "${CLAUDE_CONFIG_DIR}/" 2>/dev/null || true
            touch "${CLAUDE_CONFIG_DIR}/.ddev-claude-migrated"
        fi

        mkdir -p "${HOME}/.local/bin/"
        ln -s "/usr/local/bin/claude" "${HOME}/.local/bin/claude"
        export PATH="${HOME}/.local/bin:${PATH}"

        [ -e ~/.claude ] && mv ~/.claude ~/.claude.bak
        ln -s "${CLAUDE_CONFIG_DIR}" ~/.claude

        # Defaults -- used when no user JSON exists.
        MARKETPLACES=(
            "https://github.com/anthropics/claude-plugins-official"
        )

        PLUGINS=(
            "context7@claude-plugins-official"
            "php-lsp@claude-plugins-official"
            "code-simplifier@claude-plugins-official"
            "code-review@claude-plugins-official"
            "security-guidance@claude-plugins-official"
        )

        # Optional per-project override. DDEV mounts .ddev as /mnt/ddev_config in the
        # web container. If .ddev/claude-plugins.json exists it FULLY REPLACES the
        # defaults above. See .ddev/claude-plugins.example.json for the format.
        PLUGINS_CONFIG="/mnt/ddev_config/claude-plugins.json"
        if [ -f "$PLUGINS_CONFIG" ]; then
            if jq -e . "$PLUGINS_CONFIG" >/dev/null 2>&1; then
                MARKETPLACES=()
                PLUGINS=()
                while IFS= read -r line; do MARKETPLACES+=("$line"); done < <(jq -r '.marketplaces[]? // empty' "$PLUGINS_CONFIG")
                while IFS= read -r line; do PLUGINS+=("$line"); done < <(jq -r '.plugins[]? // empty' "$PLUGINS_CONFIG")
                echo "Claude: using marketplaces/plugins from .ddev/claude-plugins.json"
            else
                echo "Claude: .ddev/claude-plugins.json is not valid JSON; falling back to defaults." >&2
            fi
        fi

        INSTALLED_PLUGINS=$(claude plugin list --json)
        INSTALLED_MARKETPLACES=$(claude plugin marketplace list --json)

        for MARKETPLACE in "${MARKETPLACES[@]}"; do
            if echo "$INSTALLED_MARKETPLACES" | jq -e --arg marketplace "$MARKETPLACE" '.[] | select(.id == $marketplace)' > /dev/null; then
                continue
            fi

            claude plugin marketplace add "$MARKETPLACE"
        done

        for PLUGIN in "${PLUGINS[@]}"; do
            if echo "$INSTALLED_PLUGINS" | jq -e --arg plugin "$PLUGIN" '.[] | select(.id == $plugin)' > /dev/null; then
                continue
            fi

            claude plugin install "$PLUGIN"
        done